<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Silent Disco</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-topbar">
        <div class="container auth-topbar-inner">
            <a href="index.html" class="logo-link">
                <img src="img/logo.png" alt="Silent Beats logo" class="site-logo">
            </a>
        </div>
    </div>

    <main>
        <section class="auth-section">
            <div class="container auth-shell">
                <div class="auth-benefits auth-visual-panel">
                    <img src="img/special-project-stage-crowd.jpg" alt="Crowd enjoying a stage show with concert lights" class="auth-visual-image">
                </div>

                <div class="auth-form-card">
                    <div class="section-heading left-align compact-heading">
                        <span class="eyebrow">REGISTER</span>
                        <h2>Create your account</h2>
                        <p class="section-copy">Fill in your details to get started.</p>
                    </div>

                    <form class="site-form">
                        <div class="input-grid">
                            <label class="input-field">
                                <span>Full Name</span>
                                <input type="text" placeholder="Your full name">
                            </label>

                            <label class="input-field">
                                <span>Phone Number</span>
                                <input type="tel" placeholder="+91 98765 43210">
                            </label>
                        </div>

                        <label class="input-field">
                            <span>Email Address</span>
                            <input type="email" placeholder="you@example.com">
                        </label>

                        <label class="input-field">
                            <span>Password</span>
                            <input type="password" placeholder="Create a password">
                        </label>

                        <label class="input-field">
                            <span>Confirm Password</span>
                            <input type="password" placeholder="Re-enter password">
                        </label>

                        <div class="checkbox-row">
                            <label><input type="checkbox"> I agree to the terms and privacy policy</label>
                        </div>

                        <button type="submit" class="btn auth-btn">Create Account</button>
                    </form>

                    <p class="helper-links">Already registered? <a href="login.html">Login here</a></p>

                    <div class="auth-divider">
                        <span>or sign up with</span>
                    </div>

                    <div class="auth-socials">
                        <a href="#" class="auth-social-btn" aria-label="Register with Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#" class="auth-social-btn" aria-label="Register with Instagram"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" class="auth-social-btn" aria-label="Register with YouTube"><i class="fa-brands fa-youtube"></i></a>
                        <a href="#" class="auth-social-btn" aria-label="Register with Apple"><i class="fa-brands fa-apple"></i></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
